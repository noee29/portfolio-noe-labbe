<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Decorative element top-right -->
  <circle cx="85" cy="15" r="8" fill="#ffffff" opacity="0.2"/>
  
  <!-- Text "NL" -->
  <text x="50" y="65" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-2">
    NL
  </text>
  
  <!-- Decorative line under text -->
  <line x1="25" y1="75" x2="75" y2="75" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
</svg>